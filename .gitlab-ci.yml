variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_DEPTH: "0"
  # Flip to "true" to re-enable automatic publishing to GitLab Pages.
  PUBLISH_PAGES: "false"

stages:
  - build
  - deploy

build:
  stage: build
  # hugomods/hugo:exts ships Hugo extended + Go + Node + Git, which are all
  # needed because the site pulls Docsy in as a Hugo Module.
  image: hugomods/hugo:exts
  script:
    - npm ci
    - hugo --gc --minify --baseURL "${CI_PAGES_URL}/"
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

pages:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Publishing to GitLab Pages"
  needs:
    - build
  artifacts:
    paths:
      - public
  rules:
    - if: $PUBLISH_PAGES == "true" && $CI_COMMIT_BRANCH == "main"
    - if: $PUBLISH_PAGES == "true" && $CI_PIPELINE_SOURCE == "web"
